name: EU Insurance Remote Job Monitor v2

on:
  pull_request:
  schedule:
    - cron: '0 7 * * *'           # 8 AM CET daily
    - cron: '0 8 * * 1'           # 9 AM CET Monday digest
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Which job to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - check-jobs
          - scan-companies
          - scan-coverholds
          - weekly-digest

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:


  pr-validation:
    name: 🧪 PR Workflow Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate workflow and script syntax
        run: |
          python -m py_compile job_hunter.py company_scanner.py coverholder_scanner.py weekly_digest.py
  check-jobs:
    name: 📊 Daily Job Scanner
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_type == 'all' || github.event.inputs.job_type == 'check-jobs'))
      || (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Initialize tracker with correct header
        run: |
          [ -f seen_jobs.json ] || echo "[]" > seen_jobs.json
          [ -f job_tracker.csv ] || echo "Date,Title,Company,Source,Score,Location,Salary,Reason,Link,Status" > job_tracker.csv
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: pip install requests
      - name: Restore seen jobs cache
        uses: actions/cache/restore@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ runner.os }}-${{ github.run_id }}
          restore-keys: seen-jobs-${{ runner.os }}-
      - name: Restore job tracker cache
        uses: actions/cache/restore@v4
        with:
          path: job_tracker.csv
          key: tracker-${{ runner.os }}-${{ github.run_id }}
          restore-keys: tracker-${{ runner.os }}-
      - name: Check optional credentials
        env:
          GMAIL_USER: ${{ secrets.SMTP_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.SMTP_PASS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: |
          [ -n "$GMAIL_USER" ] && [ -n "$GMAIL_APP_PASSWORD" ] && echo "✅ Email credentials present" || echo "⚠️ Email credentials missing: scan will run, but email sending will be skipped."
          [ -n "$ANTHROPIC_API_KEY" ] && echo "✅ Anthropic key present" || echo "⚠️ Anthropic key missing: AI scoring will return 0 until configured."
          [ -n "$ADZUNA_APP_ID" ] && [ -n "$ADZUNA_APP_KEY" ] && echo "✅ Adzuna credentials present" || echo "⚠️ Adzuna credentials missing: Adzuna search will be skipped."
      - name: Run job hunter
        env:
          GMAIL_USER: ${{ secrets.SMTP_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.SMTP_PASS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python job_hunter.py
      - name: Save seen jobs cache
        uses: actions/cache/save@v4
        if: always()
        continue-on-error: true
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ runner.os }}-${{ github.run_id }}
      - name: Save job tracker cache
        uses: actions/cache/save@v4
        if: always()
        continue-on-error: true
        with:
          path: job_tracker.csv
          key: tracker-${{ runner.os }}-${{ github.run_id }}

  scan-companies:
    name: 📰 Insurtech News Scanner
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_type == 'all' || github.event.inputs.job_type == 'scan-companies'))
      || (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Initialize cache
        run: |
          [ -f seen_companies.json ] || echo "[]" > seen_companies.json
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Restore seen companies cache
        uses: actions/cache/restore@v4
        with:
          path: seen_companies.json
          key: companies-${{ runner.os }}-${{ github.run_id }}
          restore-keys: companies-${{ runner.os }}-
      - name: Check optional email credentials
        env:
          GMAIL_USER: ${{ secrets.SMTP_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.SMTP_PASS }}
        run: |
          [ -n "$GMAIL_USER" ] && [ -n "$GMAIL_APP_PASSWORD" ] && echo "✅ Email credentials present" || echo "⚠️ Email credentials missing: scanner will run, but email sending may be skipped."
      - name: Run company scanner
        env:
          GMAIL_USER: ${{ secrets.SMTP_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.SMTP_PASS }}
        run: python company_scanner.py
      - name: Save seen companies cache
        uses: actions/cache/save@v4
        if: always()
        continue-on-error: true
        with:
          path: seen_companies.json
          key: companies-${{ runner.os }}-${{ github.run_id }}

  scan-coverholds:
    name: 🏛️ Lloyd's Coverholder EU Scanner
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_type == 'all' || github.event.inputs.job_type == 'scan-coverholds'))
      || (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Initialize cache
        run: |
          [ -f seen_coverholders.json ] || echo "[]" > seen_coverholders.json
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Restore seen coverholders cache
        uses: actions/cache/restore@v4
        with:
          path: seen_coverholders.json
          key: coverholders-${{ runner.os }}-${{ github.run_id }}
          restore-keys: coverholders-${{ runner.os }}-
      - name: Check optional email credentials
        env:
          GMAIL_USER: ${{ secrets.SMTP_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.SMTP_PASS }}
        run: |
          [ -n "$GMAIL_USER" ] && [ -n "$GMAIL_APP_PASSWORD" ] && echo "✅ Email credentials present" || echo "⚠️ Email credentials missing: scanner will run, but email sending may be skipped."
      - name: Run coverholder scanner
        env:
          GMAIL_USER: ${{ secrets.SMTP_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.SMTP_PASS }}
        run: python coverholder_scanner.py
      - name: Save seen coverholders cache
        uses: actions/cache/save@v4
        if: always()
        continue-on-error: true
        with:
          path: seen_coverholders.json
          key: coverholders-${{ runner.os }}-${{ github.run_id }}

  weekly-digest:
    name: 📋 Weekly Digest
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job_type == 'all' || github.event.inputs.job_type == 'weekly-digest'))
      || (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Initialize tracker
        run: |
          [ -f job_tracker.csv ] || echo "Date,Title,Company,Source,Score,Location,Salary,Reason,Link,Status" > job_tracker.csv
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Restore job tracker cache
        uses: actions/cache/restore@v4
        with:
          path: job_tracker.csv
          key: tracker-${{ runner.os }}-${{ github.run_id }}
          restore-keys: tracker-${{ runner.os }}-
      - name: Check optional email credentials
        env:
          GMAIL_USER: ${{ secrets.SMTP_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.SMTP_PASS }}
        run: |
          [ -n "$GMAIL_USER" ] && [ -n "$GMAIL_APP_PASSWORD" ] && echo "✅ Email credentials present" || echo "⚠️ Email credentials missing: weekly digest may skip email sending."
      - name: Send weekly digest
        env:
          GMAIL_USER: ${{ secrets.SMTP_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.SMTP_PASS }}
        run: python weekly_digest.py
