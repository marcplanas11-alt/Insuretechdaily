name: Weekly Credential Health Check

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9 AM UTC, before the digest runs
  workflow_dispatch:

jobs:
  check-smtp:
    name: 🔐 Verify Gmail SMTP credentials
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test SMTP login
        id: smtp_test
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python - <<'EOF'
          import os, smtplib, sys

          user = os.environ.get("GMAIL_USER", "")
          pwd  = os.environ.get("GMAIL_APP_PASSWORD", "")

          if not user or not pwd:
              print("FAIL: GMAIL_USER or GMAIL_APP_PASSWORD secret is blank.")
              sys.exit(1)

          try:
              with smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=15) as s:
                  s.login(user, pwd)
              print(f"OK: SMTP login succeeded for {user}")
          except smtplib.SMTPAuthenticationError:
              print(f"FAIL: SMTP authentication rejected for {user}.")
              print("The Gmail App Password was likely revoked by Google.")
              print("Regenerate it at https://myaccount.google.com/apppasswords")
              sys.exit(2)
          except Exception as e:
              print(f"FAIL: SMTP connection error: {e}")
              sys.exit(3)
          EOF

      - name: Open GitHub issue if credentials are broken
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🔐 Email credentials need updating';
            const body = [
              '**The weekly credential check failed.**',
              '',
              'One of the following GitHub secrets is missing or invalid:',
              '- `GMAIL_USER`',
              '- `GMAIL_APP_PASSWORD`',
              '',
              '**Steps to fix:**',
              '1. Go to **Settings → Secrets and variables → Actions** in this repo.',
              '2. Confirm `GMAIL_USER` is set to your Gmail address.',
              '3. Go to https://myaccount.google.com/apppasswords and generate a new App Password.',
              '4. Update `GMAIL_APP_PASSWORD` with the new 16-character code.',
              '',
              `Triggered by workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            // Avoid duplicate open issues
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'credentials',
            });

            if (existing.data.some(i => i.title === title)) {
              console.log('Issue already open — skipping duplicate.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['credentials'],
            });
