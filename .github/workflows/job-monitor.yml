name: EU Insurtech Remote Job Monitor

on:
  schedule:
    - cron: "0 8 * * *"   # Every day at 8:00 AM UTC
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

jobs:
  check-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ runner.os }}
          restore-keys: seen-jobs-

      - name: Run job scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scraper.py

      - name: Save updated seen jobs cache
        uses: actions/cache/save@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ runner.os }}-${{ github.run_id }}

