name: EU Insurtech Remote Job Monitor

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:

  check-jobs:
    name: Remote Job Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests reportlab

      - name: Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ runner.os }}-${{ github.run_id }}
          restore-keys: seen-jobs-${{ runner.os }}-

      - name: Restore job tracker cache
        uses: actions/cache@v4
        with:
          path: job_tracker.csv
          key: job-tracker-${{ runner.os }}-${{ github.run_id }}
          restore-keys: job-tracker-${{ runner.os }}-

      - name: Run AI job hunter
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python job_hunter.py

      - name: Save seen jobs cache
        uses: actions/cache@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ runner.os }}-${{ github.run_id }}

      - name: Save job tracker cache
        uses: actions/cache@v4
        with:
          path: job_tracker.csv
          key: job-tracker-${{ runner.os }}-${{ github.run_id }}

  scan-companies:
    name: New Insurtech Company Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Restore seen companies cache
        uses: actions/cache@v4
        with:
          path: seen_companies.json
          key: seen-companies-${{ runner.os }}-${{ github.run_id }}
          restore-keys: seen-companies-${{ runner.os }}-

      - name: Run company scanner
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python company_scanner.py

      - name: Save seen companies cache
        uses: actions/cache@v4
        with:
          path: seen_companies.json
          key: seen-companies-${{ runner.os }}-${{ github.run_id }}

  weekly-digest:
    name: Weekly Digest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Restore job tracker cache
        uses: actions/cache@v4
        with:
          path: job_tracker.csv
          key: job-tracker-${{ runner.os }}-${{ github.run_id }}
          restore-keys: job-tracker-${{ runner.os }}-

      - name: Send weekly digest
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python weekly_digest.py

